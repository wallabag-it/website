{{ $items := index site.Data.testimonials site.Language.Lang | default (index site.Data.testimonials "en") -}}
<div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center text-start">
{{ range $items }}
<div class="col">
<div class="card h-100 shadow-sm">
<div class="card-body d-flex flex-column p-4">
<i class="fas fa-quote-left fa-lg text-secondary mb-3" aria-hidden="true"></i>
<blockquote class="blockquote flex-grow-1"><p class="fs-6 fst-italic">{{ .quote }}</p></blockquote>
<footer class="blockquote-footer mt-auto mb-0">{{ .author }}{{ with .role }}, {{ . }}{{ end }}{{ with .since }} — {{ . }}{{ end }}</footer>
</div>
</div>
</div>
{{ end }}
</div>
