en:
  - quote: "I'm very happy with the service. I've been a subscriber for 8 years and think it's great. Keep up the good work!"
    author: "Nils"
    context: "Long-term subscriber"
    since: "8 years"
  - quote: "Just wanted to reach out and say that you are doing a great job and your work is very much appreciated."
    author: "Sebastiaan"
    context: "Project support"
  - quote: "I used to be a Pocket user on Firefox until I started using wallabag and it's been great! It genuinely helps me on a day to day with my reading. So thank you so much for supporting it and the community."
    author: "Kevin"
    context: "Former Pocket user"
  - quote: "Awesome! I think I'm a light user but I appreciate how easy you make it to use, so I don't need to bother with self hosting :-)"
    author: "Chris"
    context: "Hosted instead of self-hosted"
fr:
  - quote: "Je suis très satisfait du service. Je suis abonné depuis 8 ans et je trouve ça génial. Continuez comme ça !"
    author: "Nils"
    context: "Abonné de longue date"
    since: "8 ans"
  - quote: "Je voulais simplement vous écrire pour vous dire que vous faites un excellent travail et qu'il est très apprécié."
    author: "Sebastiaan"
    context: "Soutien au projet"
  - quote: "J'étais utilisateur de Pocket sur Firefox jusqu'à ce que je passe à wallabag, et c'est super ! Ça m'aide vraiment au quotidien dans mes lectures. Alors merci beaucoup de faire vivre ce service et sa communauté."
    author: "Kevin"
    context: "Ancien utilisateur Pocket"
  - quote: "Génial ! Je pense être un petit utilisateur, mais j'apprécie la simplicité du service : je n'ai pas à me soucier de l'auto-hébergement :-)"
    author: "Chris"
    context: "Hébergé plutôt qu'auto-hébergé"
