baseURL: https://wallabag.it
title: wallabag.it — Read your articles later

# cSpell:ignore goldmark github hugo readingtime docsy subdir lastmod pygments linenos catmullrom norsk gu

# Language settings
contentDir: content/en
defaultContentLanguage: en
defaultContentLanguageInSubdir: true
# Useful when translating.
enableMissingTranslationPlaceholders: true

enableRobotsTXT: true

# Will give values to .Lastmod etc.
enableGitInfo: false

# Comment out to disable taxonomies in Docsy
# disableKinds: [taxonomy]

pagination:
  pagerSize: 5

# You can add your own taxonomies
#taxonomies:
#  tag: tags
#  category: categories

# Highlighting config
pygmentsCodeFences: true
pygmentsUseClasses: false
# Use the new Chroma Go highlighter in Hugo.
pygmentsUseClassic: false
# pygmentsOptions: "linenos=table"
# See https://help.farbox.com/pygments.html
pygmentsStyle: tango

# Configure how URLs look like per section.
permalinks:
  blog: /:section/:year/:month/:day/:slug/

# Image processing configuration.
imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

# Language configuration
languages:
  en:
    languageName: English
    title: wallabag.it
    params:
      homeTitle: "wallabag.it — Save & read your articles later · alternative to Pocket, Instapaper & Pinboard"
      description: "Save web articles and read them later on any device. wallabag.it is the open-source, privacy-first read-it-later service hosted in Europe — a simple alternative to Pocket, Instapaper and Pinboard. 14-day free trial, no credit card."
    menu:
      main:
        - name: My account
          weight: 100
          url: 'https://app.wallabag.it'
  fr:
    languageName: Français
    title: wallabag.it
    contentDir: content/fr
    params:
      homeTitle: "wallabag.it — Enregistrez et lisez vos articles · alternative à Pocket, Instapaper et Pinboard"
      description: "Enregistrez vos articles web et lisez-les plus tard sur tous vos appareils. wallabag.it est le service open-source de lecture différée, respectueux de la vie privée et hébergé en Europe — une alternative à Pocket, Instapaper et Pinboard. Essai gratuit de 14 jours, sans carte bancaire."

      # Footer links, French version (overrides the site-wide params.links on /fr pages).
      links:
        user:
          - name: Nous contacter
            url: mailto:helpdesk@wallabag.it
            icon: fa fa-envelope
            desc: Une question ? Écrivez-nous !
          - name: Mastodon
            url: https://fosstodon.org/@wallabagit
            icon: fab fa-mastodon
            desc: Suivez nous sur Mastodon pour les dernières nouvelles de wallabag.it
          - name: État du service
            url: https://status.wallabag.org
            icon: fa fa-laptop-medical
            desc: Suivez ce site pour connaître l'état de santé de wallabag.it
        developer:
          - name: Comparer les alternatives
            url: ../alternatives/
            desc: Comparez wallabag.it avec Pocket, Instapaper, Readwise Reader et d'autres services de lecture différée.
          - name: Documentation
            url: https://helpdesk.wallabag.it/help/
            desc: Base de connaissances et aide pour wallabag.it.
          - name: FAQ
            url: /fr/faq/
            desc: Questions fréquentes sur wallabag.it.

    menu:
      main:
        - name: Blog
          weight: 44
          url: ../fr/blog
        - name: Mon compte
          weight: 100
          url: 'https://app.wallabag.it'

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    # See a complete list of available styles at https://xyproto.github.io/splash/docs/all.html
    style: tango
    # Uncomment if you want your chosen highlight style used for code blocks without a specified language
    # guessSyntax: true

# Everything below this are Site Params

# Comment out if you don't want the "print entire section" link enabled.
outputs:
  section: [HTML, RSS]

params:
  # Subscription plans — single source of truth, reused by JSON-LD structured
  # data and (later) the pricing page. Prices in EUR.
  plans:
    - id: 3m
      name: "3 months"
      price: "4"
      duration: P3M
    - id: 1y
      name: "1 year"
      price: "11"
      duration: P1Y
    - id: heart
      name: "Heart subscription"
      price: "30"
      duration: P1Y

  taxonomy:
    # set taxonomyCloud = [] to hide taxonomy clouds
    taxonomyCloud: []

    # If used, must have same length as taxonomyCloud
    taxonomyCloudTitle: []

    # set taxonomyPageHeader = [] to hide taxonomies on the page headers
    taxonomyPageHeader: []

  privacy_policy: /fr/mentions-legales/

  # First one is picked as the OpenGraph/Twitter card image if not set on page.
  images: [images/social-card.png]

  # Menu title if your navbar has a versions selector to access old versions of your site.
  # This menu appears only if you have at least one [params.versions] set.
  #version_menu: Releases

  # Flag used in the "version-banner" partial to decide whether to display a
  # banner on every page indicating that this is an archived version of the docs.
  # Set this flag to "true" if you want to display the banner.
  #archived_version: false

  # The version number for the version of the docs represented in this doc set.
  # Used in the "version-banner" partial to display a version number for the
  # current doc set.
  version: 0.0

  # A link to latest version of the docs. Used in the "version-banner" partial to
  # point people to the main doc site.
  #url_latest_version: https://example.com

  # Repository configuration (URLs for in-page links to opening issues and suggesting changes)
  #github_repo: https://github.com/wallabag-it/website

  # An optional link to a related project repo. For example, the sibling repository where your product code lives.
#  github_project_repo: https://github.com/wallabag/wallabag

  # Specify a value here if your content directory is not in your repo's root directory
  # github_subdir: ""

  # Uncomment this if your GitHub repo does not have "main" as the default branch,
  # or specify a new value if you want to reference another branch in your GitHub links
  #github_branch: main

  # Google Custom Search Engine ID. Remove or comment out to disable search.
  #gcs_engine_id: d72aa9b2712488cc3

  # Enable Lunr.js offline search
  offlineSearch: false

  # Enable syntax highlighting and copy buttons on code blocks with Prism
  prism_syntax_highlighting: false

  copyright:
    authors: Nicolas Lœuillet
    from_year: 2016

  # User interface configuration
  ui:
    # Set to true to disable breadcrumb navigation.
    breadcrumb_disable: false
    # Set to false if you don't want to display a logo (/assets/icons/logo.svg) in the top navbar
    navbar_logo: true
    # Set to true if you don't want the top navbar to be translucent when over a `block/cover`, like on the homepage.
    navbar_translucent_over_cover_disable: true
    # Enable to show the side bar menu in its compact state.
    sidebar_menu_compact: true
    # Set to true to hide the sidebar search box (the top nav search box will still be displayed if search is enabled)
    sidebar_search_disable: true

    showLightDarkModeMenu: false

    # Adds a H2 section titled "Feedback" to the bottom of each doc. The responses are sent to Google Analytics as events.
    # This feature depends on [services.googleAnalytics] and will be disabled if "services.googleAnalytics.id" is not set.
    # If you want this feature, but occasionally need to remove the "Feedback" section from a single page,
    # add "hide_feedback: true" to the page's front matter.
    feedback:
      enable: false

    # Adds a reading time to the top of each doc.
    # If you want this feature, but occasionally need to remove the Reading time from a single page,
    # add "hide_readingtime: true" to the page's front matter
    readingtime:
      enable: false

  links:
    # End user relevant links. These will show up on left side of footer and in the community page if you have one.
    user:
      - name: Contact us
        url: mailto:helpdesk@wallabag.it
        icon: fa fa-envelope
        desc: Any question? Contact us!
      - name: Mastodon
        url: https://fosstodon.org/@wallabagit
        icon: fab fa-mastodon
        desc: Follow us on Mastodon to get the latest news of wallabag.it
      - name: Status website
        url: https://status.wallabag.org
        icon: fa fa-laptop-medical
        desc: Follow this website to have some news about wallabag.it healthcheck
    # # Developer relevant links. These will show up on right side of footer and in the community page if you have one.
    developer:
      - name: Compare alternatives
        url: ../alternatives/
        desc: Compare wallabag.it with Pocket, Instapaper, Readwise Reader and other read-it-later services.
      - name: Documentation
        url: https://helpdesk.wallabag.it/help/en-gb
        desc: Knowledge base and help for wallabag.it
      - name: FAQ
        url: /en/faq/
        desc: Frequently asked questions about wallabag.it
    #   - name: Slack
    #     url: https://example.org/slack
    #     icon: fab fa-slack
    #     desc: Chat with other project developers
    #   - name: Developer mailing list
    #     url: https://example.org/mail
    #     icon: fa fa-envelope
    #     desc: Discuss development issues around the project

module:
  # Uncomment the next line to build and serve using local docsy clone declared in the named Hugo workspace:
  # workspace: docsy.work
  hugoVersion:
    extended: true
    min: 0.146.0
  imports:
    - path: github.com/google/docsy
      disable: false
